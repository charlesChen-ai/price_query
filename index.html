<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workspace Overview</title>
    <meta name="theme-color" content="#f3f4f6" />
    <meta name="description" content="A low-profile workspace dashboard for monitoring personal signals and reading queues." />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-left"></div>
    <div class="bg-orb orb-right"></div>

    <header class="topbar">
      <div>
        <p class="eyebrow">Workspace Overview</p>
        <h1>工作总览</h1>
      </div>
      <button id="createCardBtn" class="btn btn-primary">新建</button>
    </header>

    <main>
      <section id="cardGrid" class="card-grid"></section>
      <p id="emptyState" class="empty-state">
        还没有内容，点击右上角“新建”添加模块。
      </p>
      <p class="footer-meta">
        <span>卡片总数 <strong id="cardCount">0</strong></span>
        <span>自动刷新中 <strong id="autoRefreshCount">0</strong></span>
      </p>
    </main>

    <dialog id="createDialog" class="modal">
      <form id="createForm" class="modal-content" method="dialog">
        <div class="modal-head">
          <h2>新建卡片</h2>
          <button type="button" id="closeCreateDialog" class="icon-btn">✕</button>
        </div>

        <label>
          卡片类型
          <select id="cardType" required>
            <option value="stock">股票</option>
            <option value="hn">Hacker News 热门</option>
            <option value="quote">Quote / 思维片段</option>
          </select>
        </label>

        <label id="stockSymbolField">
          股票代码或名称
          <input
            id="symbolInput"
            type="text"
            list="stockSuggestList"
            autocomplete="off"
            placeholder="如 贵州茅台 / 600519 / AAPL"
          />
        </label>
        <datalist id="stockSuggestList"></datalist>

        <label>
          卡片标题（可选）
          <input id="nameInput" type="text" placeholder="如 贵州茅台" />
        </label>

        <label>
          刷新频率
          <select id="refreshInterval">
            <option value="5000">5 秒</option>
            <option value="10000" selected>10 秒</option>
            <option value="15000">15 秒</option>
            <option value="30000">30 秒</option>
            <option value="60000">60 秒</option>
          </select>
        </label>

        <label id="createCardVisualField">
          卡片尺寸
          <select id="cardVisualSize">
            <option value="compact">紧凑</option>
            <option value="standard" selected>标准</option>
            <option value="expanded">扩展</option>
          </select>
        </label>

        <label id="stockCostField">
          成本价（可选）
          <input
            id="costInput"
            type="number"
            inputmode="decimal"
            step="0.0001"
            min="0"
            placeholder="如 53.8000"
          />
        </label>

        <label id="hnLimitField" class="is-hidden">
          热门条数
          <input id="hnLimitInput" type="number" min="3" max="20" step="1" value="8" />
        </label>

        <label id="quoteTopicField" class="is-hidden">
          片段主题
          <select id="quoteTopicInput">
            <option value="mixed" selected>混合</option>
            <option value="economics">经济学</option>
            <option value="philosophy">哲学</option>
            <option value="engineering">工程</option>
          </select>
        </label>

        <fieldset class="permission-set" id="createPermissionContainer">
          <legend>自定义权限</legend>
        </fieldset>

        <button type="submit" class="btn btn-primary">创建卡片</button>
      </form>
    </dialog>

    <dialog id="permissionDialog" class="modal">
      <form id="permissionForm" class="modal-content" method="dialog">
        <div class="modal-head">
          <h2>卡片权限设置</h2>
          <button type="button" id="closePermissionDialog" class="icon-btn">✕</button>
        </div>

        <input type="hidden" id="permissionCardId" />

        <label>
          刷新频率
          <select id="permissionRefreshInterval">
            <option value="5000">5 秒</option>
            <option value="10000">10 秒</option>
            <option value="15000">15 秒</option>
            <option value="30000">30 秒</option>
            <option value="60000">60 秒</option>
          </select>
        </label>

        <label id="permissionCardVisualField">
          卡片尺寸
          <select id="permissionCardVisualSize">
            <option value="compact">紧凑</option>
            <option value="standard">标准</option>
            <option value="expanded">扩展</option>
          </select>
        </label>

        <label id="permissionCostField">
          成本价（可选）
          <input
            id="permissionCostInput"
            type="number"
            inputmode="decimal"
            step="0.0001"
            min="0"
            placeholder="如 53.8000"
          />
        </label>

        <label id="permissionHnLimitField" class="is-hidden">
          热门条数
          <input id="permissionHnLimitInput" type="number" min="3" max="20" step="1" value="8" />
        </label>

        <label id="permissionQuoteTopicField" class="is-hidden">
          片段主题
          <select id="permissionQuoteTopicInput">
            <option value="mixed">混合</option>
            <option value="economics">经济学</option>
            <option value="philosophy">哲学</option>
            <option value="engineering">工程</option>
          </select>
        </label>

        <fieldset class="permission-set" id="permissionContainer">
          <legend>权限开关</legend>
        </fieldset>

        <button type="submit" class="btn btn-primary">保存设置</button>
      </form>
    </dialog>

    <template id="cardTemplate">
      <article class="stock-card">
        <header class="card-head">
          <div>
            <p class="symbol"></p>
            <h3 class="name"></h3>
          </div>
          <div class="card-actions"></div>
        </header>

        <section class="metrics"></section>
        <section class="chart-wrap"></section>
        <section class="volume-wrap"></section>
        <section class="news-wrap"></section>
        <section class="quote-wrap"></section>

        <footer class="status-row">
          <span class="status-text">等待刷新</span>
        </footer>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
